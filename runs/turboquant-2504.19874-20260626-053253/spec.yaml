# TurboQuant (arXiv 2504.19874) — Section 4.1 Empirical Validation.
# Scope: reproduce the CORE algorithm (TurboQuant_mse + TurboQuant_prod) and grade the
# measured distortion rates / (un)biasedness against the paper's numbers. No official
# repo -> from-scratch path; impl/ is hand-written. Data: real DBpedia OpenAI3 1536-d
# embeddings (100k train + 1k query), unit-normalized, as in the paper.
# The algorithm is data-OBLIVIOUS (random rotation + fixed codebook), hence calib known.
paper: '2504.19874'
repo: null
artifacts:
- id: tq-mse-b1
  base_model: Qdrant/dbpedia-entities-openai3-text-embedding-3-large-1536-1M
  method: TurboQuant_mse
  quant_config: {wbits: 1}
  calib_status: known
- id: tq-mse-b2
  base_model: Qdrant/dbpedia-entities-openai3-text-embedding-3-large-1536-1M
  method: TurboQuant_mse
  quant_config: {wbits: 2}
  calib_status: known
- id: tq-mse-b3
  base_model: Qdrant/dbpedia-entities-openai3-text-embedding-3-large-1536-1M
  method: TurboQuant_mse
  quant_config: {wbits: 3}
  calib_status: known
- id: tq-mse-b4
  base_model: Qdrant/dbpedia-entities-openai3-text-embedding-3-large-1536-1M
  method: TurboQuant_mse
  quant_config: {wbits: 4}
