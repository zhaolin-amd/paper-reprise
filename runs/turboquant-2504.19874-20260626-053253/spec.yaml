claims:
# --- MSE distortion D_mse = E[||x - x_hat||^2] vs Theorem 1 (== Lloyd-Max Gaussian MSE) ---
- id: mse-distortion-b1
  artifact: tq-mse-b1
  eval_protocol: {runner: custom, command: bash impl/run_eval.sh mse-distortion-b1,
    metric: mse_distortion, dataset: DBpedia-OpenAI3-1536, split: train, seqlen: null,
    stride: null, few_shot: null, extra_args: '{}'}
  expected: 0.36
  tolerance: 0.02
  source: Theorem 1 (thrm_mse), D_mse for b=1
  hardware: 1x GPU or CPU
- id: mse-distortion-b2
  artifact: tq-mse-b2
  eval_protocol: {runner: custom, command: bash impl/run_eval.sh mse-distortion-b2,
    metric: mse_distortion, dataset: DBpedia-OpenAI3-1536, split: train, seqlen: null,
    stride: null, few_shot: null, extra_args: '{}'}
