    quant_config:
      wbits: 3
      group_size: 128
      symmetric: true
      calib_dataset: FineWeb-Edu
      calib_nsamples: 4096
      calib_seqlen: 4096
    calib_status: known

  - id: gsq-kimi-k2.5-2bit
    base_model: moonshotai/Kimi-K2.5
    method: GSQ
    quant_config:
      wbits: 2
      group_size: 128
      symmetric: true
      calib_dataset: OpenThoughts
      calib_nsamples: 4096
      calib_seqlen: 4096
      scope: non-shared experts only
    calib_status: known

  - id: gsq-qwen3-8b-q2k
    base_model: Qwen/Qwen3-8B
    method: GSQ-GGUF
    quant_config:
      wbits: 2
      gguf_format: Q2_K
      init: unsloth-Q2_K
      calib_dataset: "OpenThoughts+OpenPlatypus+FineWeb-Edu"
      calib_nsamples: 4096
      calib_seqlen: 4096
    calib_status: known

  - id: gsq-qwen3-8b-q3km
    base_model: Qwen/Qwen3-8B
    method: GSQ-GGUF
    quant_config:
      wbits: 3
      gguf_format: Q3_K_M
      init: unsloth-Q3_K_M
      calib_dataset: "OpenThoughts+OpenPlatypus+FineWeb-Edu"
      calib_nsamples: 4096
      calib_seqlen: 4096
    calib_status: known

claims:
  # ── Llama-3.1-8B-Instruct 2-bit (headline claim from abstract) ──────────
  - id: llama3-8b-2bit-avg-acc
    artifact: gsq-llama3-8b-2bit
    eval_protocol:
      runner: official
      command: >
        bash scripts/serve_model.sh &&
        python eval_model.py --config configs/local/config.yaml
          --base-url http://localhost:8000/v1/completions
          --tasks arc_challenge,arc_easy,hellaswag,winogrande,piqa
      metric: acc_norm_avg
      dataset: "arc_challenge,arc_easy,hellaswag,winogrande,piqa"
      split: test
      seqlen: 4096
      stride: null
      few_shot: 0
      extra_args: null
    expected: 68.55
    tolerance: 0.5
    source: "Table 1 (tab:llama_all), row GSQ (ours) 2.13 bpp, col Avg, Llama-3.1-8B-Instruct"
    hardware: "1x A100 80GB"

