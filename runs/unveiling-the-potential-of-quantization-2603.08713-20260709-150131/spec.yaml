# Scope (user-selected): reproduce Table 2 (tab:eval_qwen) on Qwen3-8B, Hellaswag column,
# for MXFP4-16-OAS / MXFP4-MBS-S / MXFP4-MBS-H, plus the BF16 baseline (eval-protocol check).
# Paper: "Unveiling the Potential of Quantization" (arXiv 2603.08713v1). No official repo →
# from-scratch fake-quant reproduction (direct-cast, NO calibration, weights + activations).
paper: "2603.08713"

repo: null

artifacts:
  # ── MXFP4-OCP : block_size=32, OCP scale (maps amax to (4,8]), no OAS/MBS ──────
  - id: qwen3-8b-mxfp4-ocp
    base_model: /group/amdneuralopt/huggingface/pretrained_models/Qwen/Qwen3-8B
    method: MXFP4-OCP
    quant_config:
      wbits: 4
      abits: 4
      block_size: 32
      oas: false
      weight_mbs: none
      activation_mbs: none
    calib_status: none

  # ── BF16 baseline (validates the Hellaswag eval protocol) ──────────────────
  - id: qwen3-8b-bf16
    base_model: /group/amdneuralopt/huggingface/pretrained_models/Qwen/Qwen3-8B
    method: none
    quant_config:
      wbits: 16
    calib_status: none

  # ── MXFP4-16 : 1x16 block, E8M0 power-of-two scale, NO OAS ──────────────────────
  - id: qwen3-8b-mxfp4-16
    base_model: /group/amdneuralopt/huggingface/pretrained_models/Qwen/Qwen3-8B
    method: MXFP4-16
    quant_config:
      wbits: 4
      abits: 4
      block_size: 16
      oas: false
      weight_mbs: none
      activation_mbs: none
    calib_status: none

  # ── MXFP4-16-OAS : 1x16 block, E8M0 power-of-two scale + Overflow-Aware Scaling ──
  - id: qwen3-8b-mxfp4-16-oas
    base_model: /group/amdneuralopt/huggingface/pretrained_models/Qwen/Qwen3-8B
    method: MXFP4-16-OAS
    quant_config:
      wbits: 4
      abits: 4
      block_size: 16
      oas: true
      weight_mbs: none
      activation_mbs: none
    calib_status: none

  # ── MXFP4-MBS-S : OAS + Macro-Block-Scaling (Static) on BOTH weights & activations ──
  - id: qwen3-8b-mxfp4-mbs-s
    base_model: /group/amdneuralopt/huggingface/pretrained_models/Qwen/Qwen3-8B
    method: MXFP4-MBS-S
    quant_config:
      wbits: 4
      abits: 4
      block_size: 16
      macro_block_size: 128
      oas: true
      weight_mbs: static
      activation_mbs: static
    calib_status: none

  # ── MXFP4-MBS-H : OAS + MBS-Dynamic (weights) + MBS-Static (activations) [paper default] ──
  - id: qwen3-8b-mxfp4-mbs-h
    base_model: /group/amdneuralopt/huggingface/pretrained_models/Qwen/Qwen3-8B
    method: MXFP4-MBS-H
    quant_config:
      wbits: 4
      abits: 4
      block_size: 16
      macro_block_size: 128
      oas: true
      weight_mbs: dynamic
      activation_mbs: static
    calib_status: none

